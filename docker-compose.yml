services:
  phoebe:
    build: .
    container_name: phoebe
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - SKILLS_DIR=/app/skills
    volumes:
      - phoebe-data:/app/data
      - phoebe-skills:/app/skills
      - ./workspace:/app/workspace
    ports:
      - "8080:8080"
      - "8081:8081"

volumes:
  phoebe-data:
  phoebe-skills:
