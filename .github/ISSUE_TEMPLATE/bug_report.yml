name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Send a message to the bot: "..."
        2. Observe the response...
        3. Check Docker logs...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Docker logs (`docker compose logs --tail 50`).
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Docker version:
        - Node.js version (if running without Docker):
        - AI model in use:
      placeholder: |
        - OS: Ubuntu 24.04
        - Docker: 27.1.0
        - Model: google/gemini-3-flash-preview
    validations:
      required: true
